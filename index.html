<!doctype html>

<html lang="en">
<head>
	<meta charset="utf-8">

	<title>Pilot Flight Planner</title>
	<meta name="description" content="Tool to assist with planning flights.">

	<link rel="stylesheet" href="css/styles.css">

	<!--[if lt IE 9]>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.js"></script>
	<![endif]-->
</head>

<body>
	<datalist id="waypointlist"></datalist>
	<div id="header">
		<table id="table">
			<tr>
				<th class="code">Code</th>
				<th class="gps">GPS</th>
				<th class="location">Location</th>
				<th class="state">State</th>
				<th class="distance">Distance</th>
				<th class="headingT">Heading (True)</th>
				<th class="headingM">Heading (Magnetic)</th>
				<th class="spacer"></th>
				<th class="insert">Insert</th>
				<th class="delete">Delete</th>
			</tr>
			<tbody id="tablebody">
			</tbody>
		</table>
		<button onclick="addWaypoint()">Add Row</button>
	</div>
	<div id="map"></div>

	<script src="js/script.js"></script>
	<script async defer
	src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCV6l6IF8DNf7lv9ck6rj9PDKGsbtZj-Is&callback=initMap&libraries=geometry">
	</script>
</body>
</html>
